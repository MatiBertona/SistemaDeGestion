services:
  db:
    image: postgres:15-alpine
    container_name: inventario_db_container
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - inventario_pg_data:/var/lib/postgresql/data
      - ./basededatos/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  backend:
    build:
      context: ./backend
    container_name: inventario_backend_container
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SQLALCHEMY_ECHO=True
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - inventory_network

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: inventario_frontend_container
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - inventory_network

volumes:
  inventario_pg_data:

networks:
  inventory_network:
    driver: bridge
